services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./:/var/www
      - app_storage:/var/www/storage
    expose:
      - "9000"
    networks:
      - netvora
      - supabase

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    expose:
      - "80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - netvora
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cron:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - app
    volumes:
      - ./:/var/www
    entrypoint: >
      sh -c "echo '* * * * * php /var/www/cron/scheduler.php poll'    >  /etc/crontabs/root &&
             echo '0 2 * * * php /var/www/cron/scheduler.php billing' >> /etc/crontabs/root &&
             echo '0 * * * * php /var/www/cron/scheduler.php cleanup' >> /etc/crontabs/root &&
             crond -f -l 2"
    networks:
      - netvora
      - supabase
    healthcheck:
      disable: true

volumes:
  app_storage:

networks:
  netvora:
    driver: bridge
  supabase:
    external: true
    name: supabase_network_root
