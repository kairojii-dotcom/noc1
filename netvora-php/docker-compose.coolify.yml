services:
  app:
    image: ${COOLIFY_RESOURCE_UUID:-netvora-noc}_app:latest
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - app_storage:/var/www/storage
    expose:
      - "9000"
    networks:
      - netvora
      - supabase
    healthcheck:
      disable: true

  web:
    image: ${COOLIFY_RESOURCE_UUID:-netvora-noc}_web:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    restart: unless-stopped
    depends_on:
      - app
    expose:
      - "80"
    labels:
      traefik.enable: "true"
      traefik.docker.network: coolify
      traefik.http.routers.noc-dashboard.entrypoints: http
      traefik.http.routers.noc-dashboard.rule: Host(`192.168.10.96`) && PathPrefix(`/`)
      traefik.http.routers.noc-dashboard.service: noc-dashboard
      traefik.http.services.noc-dashboard.loadbalancer.server.port: "80"
    networks:
      - netvora
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cron:
    image: ${COOLIFY_RESOURCE_UUID:-netvora-noc}_app:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      - app
    entrypoint: >
      sh -c "echo '* * * * * php /var/www/cron/scheduler.php poll'    >  /etc/crontabs/root &&
             echo '0 2 * * * php /var/www/cron/scheduler.php billing' >> /etc/crontabs/root &&
             echo '0 * * * * php /var/www/cron/scheduler.php cleanup' >> /etc/crontabs/root &&
             crond -f -l 2"
    networks:
      - netvora
      - supabase
    healthcheck:
      disable: true

volumes:
  app_storage:

networks:
  netvora:
    driver: bridge
  supabase:
    external: true
    name: supabase_network_root